version: '3.8'
services:
  nextchat:
    image: yidadaa/chatgpt-next-web
    container_name: nextchat
    ports:
      - '3001:3000'
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - ENABLE_OLLAMA=1
      - CUSTOM_MODELS=+deepseek-coder:1.3b,+deepseek-coder:6.7b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
